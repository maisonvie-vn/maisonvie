<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#e1d9cf",
                    "surface-container-low": "#fbf2e8",
                    "secondary-fixed": "#e6e2db",
                    "on-error": "#ffffff",
                    "on-surface": "#1f1b15",
                    "primary-fixed": "#ffdea6",
                    "on-secondary-container": "#66645f",
                    "tertiary-container": "#a0a1a1",
                    "surface-tint": "#7b5800",
                    "tertiary": "#5d5f5f",
                    "on-background": "#1f1b15",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-tertiary-container": "#363838",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#f1bf5e",
                    "outline": "#817665",
                    "on-secondary": "#ffffff",
                    "primary-container": "#c89a3d",
                    "surface-bright": "#fff8f3",
                    "secondary-fixed-dim": "#c9c6c0",
                    "on-primary-fixed": "#271900",
                    "on-secondary-fixed-variant": "#484742",
                    "on-primary-fixed-variant": "#5d4200",
                    "surface-variant": "#eae1d7",
                    "surface-container": "#f6ece3",
                    "on-primary-container": "#4b3400",
                    "inverse-surface": "#343029",
                    "inverse-primary": "#f1bf5e",
                    "on-surface-variant": "#4f4637",
                    "outline-variant": "#d2c5b1",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "background": "#fff8f3",
                    "inverse-on-surface": "#f8efe5",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-secondary-fixed": "#1c1c18",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#f0e7dd",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "tertiary-fixed": "#e2e2e2",
                    "surface-container-highest": "#eae1d7",
                    "primary": "#7b5800",
                    "error-container": "#ffdad6",
                    "secondary-container": "#e6e2db",
                    "on-tertiary": "#ffffff",
                    "surface": "#fff8f3",
                    "secondary": "#605e59"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-padding": "32px",
                    "gutter": "24px",
                    "header-height": "72px",
                    "stack-lg": "32px",
                    "sidebar-width": "280px",
                    "stack-sm": "8px",
                    "stack-md": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "label-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Layout Placeholders -->
    <div id="sidebar-placeholder"></div>
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="pt-[104px] pl-[312px] pr-8 pb-12">
        <div class="max-w-[1400px] mx-auto">
            <!-- Header -->
            <div class="flex items-end justify-between mb-10">
                <div>
                    <h2 class="text-3xl font-extrabold text-on-surface">Cài đặt Hệ thống</h2>
                    <p class="text-secondary/60 mt-1">Quản lý cấu hình, người dùng và phân quyền toàn hệ thống.</p>
                </div>
                <button onclick="UI.simulateAction()" class="bg-primary text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg hover:-translate-y-0.5 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">person_add</span> Thêm Người dùng
                </button>
            </div>

            <div class="flex gap-8 items-start">
                <!-- Left Nav -->
                <nav class="w-72 flex flex-col gap-2">
                    <a class="flex items-center gap-4 px-6 py-4 rounded-2xl bg-primary text-white font-bold shadow-lg transition-all" href="#">
                        <span class="material-symbols-outlined">person</span> Người dùng
                    </a>
                    <a class="flex items-center gap-4 px-6 py-4 rounded-2xl glass-card text-secondary/60 hover:bg-white transition-all font-bold" href="#">
                        <span class="material-symbols-outlined">shield_person</span> Vai trò
                    </a>
                    <a class="flex items-center gap-4 px-6 py-4 rounded-2xl glass-card text-secondary/60 hover:bg-white transition-all font-bold" href="#">
                        <span class="material-symbols-outlined">groups</span> Nhóm
                    </a>
                    <a class="flex items-center gap-4 px-6 py-4 rounded-2xl glass-card text-secondary/60 hover:bg-white transition-all font-bold" href="#">
                        <span class="material-symbols-outlined">inventory_2</span> Sản phẩm
                    </a>
                </nav>

                <!-- Right Content -->
                <div class="flex-1 glass-card rounded-[32px] overflow-hidden border-secondary/5 shadow-sm">
                    <div class="p-8 border-b border-secondary/5 bg-white/30">
                        <h3 class="text-xl font-extrabold text-on-surface">Danh sách Người dùng</h3>
                        <p class="text-xs font-bold text-secondary/40 uppercase tracking-widest mt-1">3 tài khoản hoạt động</p>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="border-b border-secondary/5 bg-white/10">
                                    <th class="px-8 py-6 text-[10px] font-bold text-secondary/40 uppercase tracking-[0.2em]">Họ và Tên</th>
                                    <th class="px-8 py-6 text-[10px] font-bold text-secondary/40 uppercase tracking-[0.2em]">Vai trò</th>
                                    <th class="px-8 py-6 text-[10px] font-bold text-secondary/40 uppercase tracking-[0.2em]">Nhóm công tác</th>
                                    <th class="px-8 py-6 text-[10px] font-bold text-secondary/40 uppercase tracking-[0.2em] text-right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-secondary/5" id="user-table-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Footer -->
                    <div class="px-8 py-6 border-t border-secondary/5 flex items-center justify-between bg-white/10">
                        <span class="text-xs font-bold text-secondary/40">Hiển thị 3 trong số 3 bản ghi</span>
                        <div class="flex items-center gap-2">
                            <button class="w-10 h-10 rounded-xl border border-secondary/10 flex items-center justify-center text-secondary/40 disabled:opacity-30" disabled>
                                <span class="material-symbols-outlined">chevron_left</span>
                            </button>
                            <button class="w-10 h-10 rounded-xl bg-primary text-white text-xs font-bold">1</button>
                            <button class="w-10 h-10 rounded-xl border border-secondary/10 flex items-center justify-center text-secondary/40 disabled:opacity-30" disabled>
                                <span class="material-symbols-outlined">chevron_right</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Scripts -->
    <script src="js/data.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/ui-actions.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderUsers();
        });

        function renderUsers() {
            const tbody = document.getElementById('user-table-body');
            const users = [
                { name: "Lê Quang Đạt", email: "dat.lq@vinhhung.vn", role: "Sales", group: "Bán hàng miền Nam" },
                { name: "Trần Thị Mai", email: "mai.tt@vinhhung.vn", role: "Team Lead", group: "Bán hàng miền Nam" },
                { name: "Nguyễn Văn Thắng", email: "thang.nv@vinhhung.vn", role: "Admin", group: "Quản trị hệ thống" }
            ];

            tbody.innerHTML = users.map(u => `
                <tr class="hover:bg-primary/5 transition-all group cursor-pointer">
                    <td class="px-8 py-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-secondary/5 flex items-center justify-center text-primary font-extrabold border-2 border-white shadow-sm">
                                ${u.name.split(' ').map(n => n[0]).join('').slice(0, 2)}
                            </div>
                            <div>
                                <p class="text-sm font-bold text-on-surface">${u.name}</p>
                                <p class="text-[11px] text-secondary/60">${u.email}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        <span class="badge ${u.role === 'Admin' ? 'badge-vip' : 'badge-retail'}">${u.role}</span>
                    </td>
                    <td class="px-8 py-6 text-sm font-bold text-secondary/60">${u.group}</td>
                    <td class="px-8 py-6 text-right">
                        <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="UI.simulateAction()" class="w-9 h-9 rounded-xl hover:bg-white text-secondary/30 hover:text-primary transition-all">
                                <span class="material-symbols-outlined text-lg">edit</span>
                            </button>
                            <button onclick="UI.simulateAction()" class="w-9 h-9 rounded-xl hover:bg-white text-secondary/30 hover:text-red-500 transition-all">
                                <span class="material-symbols-outlined text-lg">delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
