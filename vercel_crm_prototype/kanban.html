<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#454747",
                    "surface-container-highest": "#eae1d7",
                    "on-surface-variant": "#4f4637",
                    "surface-variant": "#eae1d7",
                    "surface-container-low": "#fbf2e8",
                    "primary": "#7b5800",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#d2c5b1",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-primary-fixed-variant": "#5d4200",
                    "on-secondary-container": "#66645f",
                    "surface-bright": "#fff8f3",
                    "tertiary": "#5d5f5f",
                    "on-secondary-fixed": "#1c1c18",
                    "tertiary-fixed": "#e2e2e2",
                    "on-error": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#c9c6c0",
                    "primary-container": "#c89a3d",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "on-background": "#1f1b15",
                    "on-primary-fixed": "#271900",
                    "surface": "#fff8f3",
                    "on-tertiary-container": "#363838",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "primary-fixed": "#ffdea6",
                    "secondary-fixed": "#e6e2db",
                    "on-secondary-fixed-variant": "#484742",
                    "inverse-surface": "#343029",
                    "surface-container-high": "#f0e7dd",
                    "on-primary-container": "#4b3400",
                    "inverse-on-surface": "#f8efe5",
                    "secondary-container": "#e6e2db",
                    "surface-dim": "#e1d9cf",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#f1bf5e",
                    "tertiary-container": "#a0a1a1",
                    "secondary": "#605e59",
                    "on-surface": "#1f1b15",
                    "outline": "#817665",
                    "surface-container": "#f6ece3",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#f1bf5e",
                    "background": "#fff8f3",
                    "surface-tint": "#7b5800"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "24px",
                    "stack-sm": "8px",
                    "stack-md": "16px",
                    "sidebar-width": "280px",
                    "container-padding": "32px",
                    "header-height": "72px",
                    "stack-lg": "32px"
            },
            "fontFamily": {
                    "display-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "headline-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="overflow-x-hidden">
    <!-- Layout Placeholders -->
    <div id="sidebar-placeholder"></div>
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="pt-[104px] pl-[312px] pr-8 pb-32">
        <div class="max-w-[1600px] mx-auto">
            <div class="flex items-end justify-between mb-10">
                <div>
                    <h2 class="text-3xl font-extrabold text-on-surface">Quản lý Cơ hội</h2>
                    <p class="text-secondary/60 mt-1">Kéo thả để cập nhật trạng thái đơn hàng của bạn.</p>
                </div>
                <div class="flex gap-4">
                    <button class="bg-white/50 border border-secondary/10 px-5 py-2.5 rounded-2xl text-sm font-bold text-secondary/60 hover:bg-white transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">filter_list</span> Bộ lọc
                    </button>
                    <button onclick="UI.openQuickAddMenu()" class="bg-primary text-white px-6 py-2.5 rounded-2xl text-sm font-bold shadow-lg hover:-translate-y-0.5 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">add</span> Tạo cơ hội
                    </button>
                </div>
            </div>

            <!-- Kanban Board -->
            <div class="flex gap-6 overflow-x-auto pb-10 min-h-[70vh]" id="kanban-board">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Summary Floating Bar -->
        <div class="fixed bottom-10 left-[312px] right-10 flex justify-center z-30 pointer-events-none">
            <div class="glass-card px-10 py-5 rounded-[24px] shadow-2xl flex gap-12 items-center pointer-events-auto border-primary/20">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-secondary/40 uppercase tracking-widest mb-1">Tổng giá trị</p>
                    <p class="text-xl font-extrabold text-primary">1.127.500.000đ</p>
                </div>
                <div class="w-[1px] h-8 bg-secondary/10"></div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-secondary/40 uppercase tracking-widest mb-1">Cơ hội mở</p>
                    <p class="text-xl font-extrabold text-on-surface">11</p>
                </div>
                <div class="w-[1px] h-8 bg-secondary/10"></div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-secondary/40 uppercase tracking-widest mb-1">Tỷ lệ chốt</p>
                    <p class="text-xl font-extrabold text-emerald-500">68%</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Scripts -->
    <script src="js/data.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/ui-actions.js"></script>
    <script>
        const STAGES = ["Mới", "Đang tư vấn", "Gửi báo giá", "Đàm phán", "Chốt đơn", "Thất bại"];
        
        document.addEventListener('DOMContentLoaded', () => {
            renderKanban();
        });

        function renderKanban() {
            const board = document.getElementById('kanban-board');
            board.innerHTML = STAGES.map(stage => {
                const stageCustomers = CRM_DATA.customers.filter(c => c.status === stage);
                return `
                    <div class="kanban-column flex flex-col gap-4">
                        <div class="flex items-center justify-between px-2 mb-2">
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full ${getStageColor(stage)}"></span>
                                <h3 class="font-bold text-secondary/80 text-sm">${stage}</h3>
                                <span class="bg-secondary/5 text-secondary/40 text-[10px] font-bold px-2 py-0.5 rounded-full">${stageCustomers.length}</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-3">
                            ${stageCustomers.map(c => `
                                <div class="glass-card p-4 rounded-2xl kanban-card border-white/60 bg-white/40 shadow-sm" onclick="showCustomerDetail(${c.id})">
                                    <div class="flex justify-between items-start mb-3">
                                        <span class="badge ${c.type === 'VIP' ? 'badge-vip' : c.type === 'Đại lý' ? 'badge-agency' : 'badge-retail'}">${c.type}</span>
                                        <span class="text-[10px] font-bold text-secondary/20">#OP-${1000 + c.id}</span>
                                    </div>
                                    <h4 class="text-sm font-bold text-on-surface mb-1">${c.company || c.name}</h4>
                                    <p class="text-primary font-extrabold text-lg mb-4">${c.value.toLocaleString()}đ</p>
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-2">
                                            <div class="w-6 h-6 rounded-full bg-secondary/5 flex items-center justify-center text-[10px] font-bold border-2 border-white">${c.name.charAt(0)}</div>
                                            <span class="text-[11px] font-medium text-secondary/60">${c.name}</span>
                                        </div>
                                        <div class="flex items-center gap-1 text-secondary/30">
                                            <span class="material-symbols-outlined text-sm">schedule</span>
                                            <span class="text-[10px] font-bold">2d</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                            <button onclick="UI.openQuickAddMenu()" class="w-full py-4 border-2 border-dashed border-secondary/10 rounded-2xl text-secondary/30 hover:text-primary hover:border-primary/30 hover:bg-primary/5 transition-all flex items-center justify-center">
                                <span class="material-symbols-outlined">add</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStageColor(stage) {
            switch(stage) {
                case 'Mới': return 'bg-slate-400';
                case 'Đang tư vấn': return 'bg-blue-400';
                case 'Gửi báo giá': return 'bg-amber-400';
                case 'Đàm phán': return 'bg-orange-400';
                case 'Chốt đơn': return 'bg-emerald-500';
                case 'Thất bại': return 'bg-red-400';
                default: return 'bg-slate-400';
            }
        }

        function showCustomerDetail(id) {
            const c = CRM_DATA.customers.find(item => item.id === id);
            const content = `
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center text-primary text-2xl font-bold">
                            ${c.name.charAt(0)}
                        </div>
                        <div>
                            <h4 class="text-xl font-bold text-on-surface">${c.name}</h4>
                            <p class="text-sm text-secondary/60">${c.company}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 rounded-2xl bg-secondary/5">
                            <p class="text-[10px] font-bold text-secondary/40 uppercase mb-1">Giá trị dự kiến</p>
                            <p class="font-extrabold text-primary">${c.value.toLocaleString()}đ</p>
                        </div>
                        <div class="p-4 rounded-2xl bg-secondary/5">
                            <p class="text-[10px] font-bold text-secondary/40 uppercase mb-1">Trạng thái</p>
                            <p class="font-extrabold text-on-surface">${c.status}</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 text-sm text-secondary/80">
                            <span class="material-symbols-outlined text-primary/40">phone</span> ${c.phone}
                        </div>
                        <div class="flex items-center gap-3 text-sm text-secondary/80">
                            <span class="material-symbols-outlined text-primary/40">mail</span> ${c.email}
                        </div>
                    </div>
                </div>
            `;
            UI.showModal('Chi tiết Cơ hội', content, `
                <button onclick="UI.simulateAction()" class="bg-primary text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg">Lưu thay đổi</button>
            `);
        }
    </script>
</body>
